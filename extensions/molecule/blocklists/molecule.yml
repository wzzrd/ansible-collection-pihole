---
# Molecule scenario: blocklists
#
# Tests groups, clients, adlists (block/allow) and individual domain
# entries (allow/deny, exact/regex) against the shared Pi-hole instance.
#
# Infrastructure is provided by the default scenario (shared_state: true).
# Idempotence is omitted: gravity-related list operations are not idempotent.
#
# Usage:
#   molecule test --all --shared-state
#   PIHOLE_VERSION=2024.07.0 molecule test --all --shared-state

dependency:
  name: galaxy
  options:
    ignore-certs: true
    ignore-errors: true
    requirements-file: requirements.yml

driver:
  name: podman

provisioner:
  name: ansible
  log: true
  env:
    ANSIBLE_COLLECTIONS_PATHS: "${HOME}/.ansible/collections:/usr/share/ansible/collections"

verifier:
  name: ansible

scenario:
  name: blocklists
  test_sequence:
    - dependency
    - prepare
    - converge
    - verify
    - cleanup
