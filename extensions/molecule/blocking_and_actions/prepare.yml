---
# Wait for the Pi-hole API to become available.
# No extra pre-configuration is needed for blocking/action tests.

- name: Prepare Pi-hole for blocking and action testing
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    pihole_url: "http://localhost:8082"
    pihole_password: "molecule_test_password"

  tasks:
    - name: Wait for Pi-hole API to become reachable
      ansible.builtin.uri:
        url: "{{ pihole_url }}/api/auth"
        method: GET
        status_code: [200, 401, 403]
        timeout: 5
      register: _pihole_ready
      until: _pihole_ready.status in [200, 401, 403]
      retries: 36
      delay: 5

    - name: Confirm Pi-hole is ready
      ansible.builtin.debug:
        msg: "Pi-hole API is reachable (HTTP {{ _pihole_ready.status }})."
