---
# Molecule scenario: blocking_and_actions
#
# Tests the blocking module (enable/disable/timer) and the action module
# (gravity, restartdns, flush_logs, flush_arp) against the shared Pi-hole instance.
#
# Infrastructure is provided by the default scenario (shared_state: true).
# Idempotence is omitted: gravity always reports changed=true by design.
#
# Usage:
#   molecule test --all --shared-state
#   PIHOLE_VERSION=2024.07.0 molecule test --all --shared-state

dependency:
  name: galaxy
  options:
    ignore-certs: true
    ignore-errors: true
    requirements-file: requirements.yml

driver:
  name: podman

provisioner:
  name: ansible
  log: true
  env:
    ANSIBLE_COLLECTIONS_PATHS: "${HOME}/.ansible/collections:/usr/share/ansible/collections"

verifier:
  name: ansible

scenario:
  name: blocking_and_actions
  test_sequence:
    - dependency
    - prepare
    - converge
    - verify
    - cleanup
