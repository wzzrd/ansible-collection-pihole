---
# Converge playbook for the dns_dhcp scenario.
#
# Fictitious organisation: Acme Labs
# Network: 192.168.88.0/24, domain acme.lab
# IPv6 prefix: fd00:dead:beef::/48
#
# Devices:
#   nas01      192.168.88.10  fd00:dead:beef::10  de:ad:be:ef:00:01
#   workstation 192.168.88.20  fd00:dead:beef::20  de:ad:be:ef:00:02
#   laptop     192.168.88.30  -                   de:ad:be:ef:00:03
#   printer    192.168.88.40  -                   de:ad:be:ef:00:04
#   rpi-cam    192.168.88.50  -                   de:ad:be:ef:00:05
#   pihole     192.168.88.5   fd00:dead:beef::5   (infrastructure, no DHCP)

- name: Converge – create DHCP reservations, A, AAAA and CNAME records
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    pihole_url: "http://localhost:8080"
    pihole_password: "molecule_test_password"

    # ------------------------------------------------------------------ #
    # DHCP reservations                                                    #
    # ------------------------------------------------------------------ #
    dhcp_reservations:
      - hw: "de:ad:be:ef:00:01"
        ip: "192.168.88.10"
        name: "nas01.acme.lab"
      - hw: "de:ad:be:ef:00:02"
        ip: "192.168.88.20"
        name: "workstation.acme.lab"
      - hw: "de:ad:be:ef:00:03"
        ip: "192.168.88.30"
        name: "laptop.acme.lab"
      - hw: "de:ad:be:ef:00:04"
        ip: "192.168.88.40"
        name: "printer.acme.lab"
      - hw: "de:ad:be:ef:00:05"
        ip: "192.168.88.50"
        name: "rpi-cam.acme.lab"

    # ------------------------------------------------------------------ #
    # A records (IPv4)                                                     #
    # unique: true – each name resolves to exactly one IPv4 address        #
    # ------------------------------------------------------------------ #
    a_records:
      - ip: "192.168.88.5"
        name: "pihole.acme.lab"
      - ip: "192.168.88.10"
        name: "nas01.acme.lab"
      - ip: "192.168.88.20"
        name: "workstation.acme.lab"
      - ip: "192.168.88.30"
        name: "laptop.acme.lab"
      - ip: "192.168.88.40"
        name: "printer.acme.lab"
      - ip: "192.168.88.50"
        name: "rpi-cam.acme.lab"

    # ------------------------------------------------------------------ #
    # AAAA records (IPv6)                                                  #
    # unique: false – hostnames already have IPv4 A records above;         #
    # allowing multiple IPs per name lets A and AAAA coexist.              #
    # ------------------------------------------------------------------ #
    aaaa_records:
      - ip: "fd00:dead:beef::5"
        name: "pihole.acme.lab"
      - ip: "fd00:dead:beef::10"
        name: "nas01.acme.lab"
      - ip: "fd00:dead:beef::20"
        name: "workstation.acme.lab"

    # ------------------------------------------------------------------ #
    # CNAME records (alias -> canonical)                                   #
    # Each alias points to a unique canonical name (unique: true is safe). #
    # ------------------------------------------------------------------ #
    cname_records:
      - cname: "files.acme.lab"
        name: "nas01.acme.lab"
      - cname: "print.acme.lab"
        name: "printer.acme.lab"
      - cname: "cam.acme.lab"
        name: "rpi-cam.acme.lab"
      - cname: "desk.acme.lab"
        name: "workstation.acme.lab"

  tasks:
    # ------------------------------------------------------------------ #
    # Authentication                                                       # ------------------------------------------------------------------ #
    - name: Authenticate with Pi-hole
      wzzrd.pihole.auth:
        pihole: "{{ pihole_url }}"
        password: "{{ pihole_password }}"
      register: auth_result
      no_log: true

    # ------------------------------------------------------------------ #
    # DHCP reservations                                                    #
    # ------------------------------------------------------------------ #
    - name: Ensure DHCP reservations are present
      wzzrd.pihole.dhcp_reservation:
        pihole: "{{ pihole_url }}"
        sid: "{{ auth_result.sid }}"
        hw: "{{ item.hw }}"
        ip: "{{ item.ip }}"
        name: "{{ item.name }}"
        state: present
      loop: "{{ dhcp_reservations }}"
      loop_control:
        label: "{{ item.name }} ({{ item.ip }})"
      retries: 5
      delay: 5

    - name: Remove first DHCP reservation
      wzzrd.pihole.dhcp_reservation:
        pihole: "{{ pihole_url }}"
        sid: "{{ auth_result.sid }}"
        hw: "{{ dhcp_reservations[0].hw }}"
        ip: "{{ dhcp_reservations[0].ip }}"
        name: "{{ dhcp_reservations[0].name }}"
        state: absent
      retries: 5
      delay: 5

    - name: Recreate first DHCP reservation
      wzzrd.pihole.dhcp_reservation:
        pihole: "{{ pihole_url }}"
        sid: "{{ auth_result.sid }}"
        hw: "{{ dhcp_reservations[0].hw }}"
        ip: "{{ dhcp_reservations[0].ip }}"
        name: "{{ dhcp_reservations[0].name }}"
        state: present
      retries: 5
      delay: 5

    # ------------------------------------------------------------------ #
    # A records (IPv4 static DNS)                                          #
    # ------------------------------------------------------------------ #
    - name: Ensure A records are present
      wzzrd.pihole.dns_record:
        pihole: "{{ pihole_url }}"
        sid: "{{ auth_result.sid }}"
        ip: "{{ item.ip }}"
        name: "{{ item.name }}"
        state: present
        unique: true
      loop: "{{ a_records }}"
      loop_control:
        label: "{{ item.name }} -> {{ item.ip }}"
      retries: 5
      delay: 5

    - name: Remove first A record
      wzzrd.pihole.dns_record:
        pihole: "{{ pihole_url }}"
        sid: "{{ auth_result.sid }}"
        ip: "{{ a_records[0].ip }}"
        name: "{{ a_records[0].name }}"
        state: absent
        unique: true
      retries: 5
      delay: 5

    - name: Recreate first A record
      wzzrd.pihole.dns_record:
        pihole: "{{ pihole_url }}"
        sid: "{{ auth_result.sid }}"
        ip: "{{ a_records[0].ip }}"
        name: "{{ a_records[0].name }}"
        state: present
        unique: true
      retries: 5
      delay: 5

    # ------------------------------------------------------------------ #
    # AAAA records (IPv6 static DNS)                                       #
    # ------------------------------------------------------------------ #
    - name: Ensure AAAA records are present
      wzzrd.pihole.dns_record:
        pihole: "{{ pihole_url }}"
        sid: "{{ auth_result.sid }}"
        ip: "{{ item.ip }}"
        name: "{{ item.name }}"
        state: present
        unique: false
      loop: "{{ aaaa_records }}"
      loop_control:
        label: "{{ item.name }} -> {{ item.ip }}"
      retries: 5
      delay: 5

    - name: Remove first AAAA record
      wzzrd.pihole.dns_record:
        pihole: "{{ pihole_url }}"
        sid: "{{ auth_result.sid }}"
        ip: "{{ aaaa_records[0].ip }}"
        name: "{{ aaaa_records[0].name }}"
        state: absent
        unique: false
      retries: 5
      delay: 5

    - name: Recreate first AAAA record
      wzzrd.pihole.dns_record:
        pihole: "{{ pihole_url }}"
        sid: "{{ auth_result.sid }}"
        ip: "{{ aaaa_records[0].ip }}"
        name: "{{ aaaa_records[0].name }}"
        state: present
        unique: false
      retries: 5
      delay: 5

    # ------------------------------------------------------------------ #
    # CNAME records                                                        #
    # ------------------------------------------------------------------ #
    - name: Ensure CNAME records are present
      wzzrd.pihole.cname_record:
        pihole: "{{ pihole_url }}"
        sid: "{{ auth_result.sid }}"
        cname: "{{ item.cname }}"
        name: "{{ item.name }}"
        state: present
        unique: true
      loop: "{{ cname_records }}"
      loop_control:
        label: "{{ item.cname }} -> {{ item.name }}"
      retries: 5
      delay: 5

    - name: Remove first CNAME record
      wzzrd.pihole.cname_record:
        pihole: "{{ pihole_url }}"
        sid: "{{ auth_result.sid }}"
        cname: "{{ cname_records[0].cname }}"
        name: "{{ cname_records[0].name }}"
        state: absent
        unique: true
      retries: 5
      delay: 5

    - name: Recreate first CNAME record
      wzzrd.pihole.cname_record:
        pihole: "{{ pihole_url }}"
        sid: "{{ auth_result.sid }}"
        cname: "{{ cname_records[0].cname }}"
        name: "{{ cname_records[0].name }}"
        state: present
        unique: true
      retries: 5
      delay: 5
