---
# Molecule scenario: dns_dhcp
#
# Tests DHCP reservations, A records (IPv4), AAAA records (IPv6),
# and CNAME records against the shared Pi-hole instance.
#
# Infrastructure is provided by the default scenario (shared_state: true).
#
# Usage:
#   molecule test --all --shared-state
#   PIHOLE_VERSION=2024.07.0 molecule test --all --shared-state

dependency:
  name: galaxy
  options:
    ignore-certs: true
    ignore-errors: true
    requirements-file: requirements.yml

driver:
  name: podman

provisioner:
  name: ansible
  log: true
  env:
    ANSIBLE_COLLECTIONS_PATHS: "${HOME}/.ansible/collections:/usr/share/ansible/collections"

verifier:
  name: ansible

scenario:
  name: dns_dhcp
