---
# Verify playbook for the dns_dhcp scenario.
#
# Re-runs every converge task in check_mode and asserts nothing changed
# (idempotency), then spot-checks the Pi-hole API for expected objects.

- name: Verify DNS/DHCP records – idempotency and presence
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"

    pihole_url: "http://localhost:8080"
    pihole_password: "molecule_test_password"

    dhcp_reservations:
      - hw: "de:ad:be:ef:00:01"
        ip: "192.168.88.10"
        name: "nas01.acme.lab"
      - hw: "de:ad:be:ef:00:02"
        ip: "192.168.88.20"
        name: "workstation.acme.lab"
      - hw: "de:ad:be:ef:00:03"
        ip: "192.168.88.30"
        name: "laptop.acme.lab"
      - hw: "de:ad:be:ef:00:04"
        ip: "192.168.88.40"
        name: "printer.acme.lab"
      - hw: "de:ad:be:ef:00:05"
        ip: "192.168.88.50"
        name: "rpi-cam.acme.lab"

    a_records:
      - ip: "192.168.88.5"
        name: "pihole.acme.lab"
      - ip: "192.168.88.10"
        name: "nas01.acme.lab"
      - ip: "192.168.88.20"
        name: "workstation.acme.lab"
      - ip: "192.168.88.30"
        name: "laptop.acme.lab"
      - ip: "192.168.88.40"
        name: "printer.acme.lab"
      - ip: "192.168.88.50"
        name: "rpi-cam.acme.lab"

    aaaa_records:
      - ip: "fd00:dead:beef::5"
        name: "pihole.acme.lab"
      - ip: "fd00:dead:beef::10"
        name: "nas01.acme.lab"
      - ip: "fd00:dead:beef::20"
        name: "workstation.acme.lab"

    cname_records:
      - cname: "files.acme.lab"
        name: "nas01.acme.lab"
      - cname: "print.acme.lab"
        name: "printer.acme.lab"
      - cname: "cam.acme.lab"
        name: "rpi-cam.acme.lab"
      - cname: "desk.acme.lab"
        name: "workstation.acme.lab"

  tasks:
    # ------------------------------------------------------------------ #
    # Authentication                                                       #
    # ------------------------------------------------------------------ #
    - name: Authenticate with Pi-hole
      wzzrd.pihole.auth:
        pihole: "{{ pihole_url }}"
        password: "{{ pihole_password }}"
      register: auth_result
      no_log: "{{ not (molecule_debug | default(false)) }}"
      retries: 5
      delay: 5
      until: auth_result is not failed

    # ------------------------------------------------------------------ #
    # DHCP idempotency                                                     #
    # ------------------------------------------------------------------ #
    - name: Verify DHCP reservations are idempotent (check mode)
      wzzrd.pihole.dhcp_reservation:
        pihole: "{{ pihole_url }}"
        sid: "{{ auth_result.sid }}"
        hw: "{{ item.hw }}"
        ip: "{{ item.ip }}"
        name: "{{ item.name }}"
        state: present
      loop: "{{ dhcp_reservations }}"
      loop_control:
        label: "{{ item.name }}"
      check_mode: true
      register: _dhcp_check

    - name: Assert DHCP reservations report no changes
      ansible.builtin.assert:
        that: not item.changed
        fail_msg: >-
          DHCP reservation for {{ item.item.name }} ({{ item.item.ip }})
          reported changed=true – record may be missing or incorrect.
        success_msg: "DHCP reservation for {{ item.item.name }} is idempotent."
      loop: "{{ _dhcp_check.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    # ------------------------------------------------------------------ #
    # A record idempotency                                                 #
    # ------------------------------------------------------------------ #
    - name: Verify A records are idempotent (check mode)
      wzzrd.pihole.dns_record:
        pihole: "{{ pihole_url }}"
        sid: "{{ auth_result.sid }}"
        ip: "{{ item.ip }}"
        name: "{{ item.name }}"
        state: present
        unique: true
      loop: "{{ a_records }}"
      loop_control:
        label: "{{ item.name }}"
      check_mode: true
      register: _a_check

    - name: Assert A records report no changes
      ansible.builtin.assert:
        that: not item.changed
        fail_msg: >-
          A record {{ item.item.name }} -> {{ item.item.ip }}
          reported changed=true – record may be missing.
        success_msg: "A record {{ item.item.name }} is idempotent."
      loop: "{{ _a_check.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    # ------------------------------------------------------------------ #
    # AAAA record idempotency                                              #
    # ------------------------------------------------------------------ #
    - name: Verify AAAA records are idempotent (check mode)
      wzzrd.pihole.dns_record:
        pihole: "{{ pihole_url }}"
        sid: "{{ auth_result.sid }}"
        ip: "{{ item.ip }}"
        name: "{{ item.name }}"
        state: present
        unique: false
      loop: "{{ aaaa_records }}"
      loop_control:
        label: "{{ item.name }}"
      check_mode: true
      register: _aaaa_check

    - name: Assert AAAA records report no changes
      ansible.builtin.assert:
        that: not item.changed
        fail_msg: >-
          AAAA record {{ item.item.name }} -> {{ item.item.ip }}
          reported changed=true – record may be missing.
        success_msg: "AAAA record {{ item.item.name }} is idempotent."
      loop: "{{ _aaaa_check.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    # ------------------------------------------------------------------ #
    # CNAME idempotency                                                    #
    # ------------------------------------------------------------------ #
    - name: Verify CNAME records are idempotent (check mode)
      wzzrd.pihole.cname_record:
        pihole: "{{ pihole_url }}"
        sid: "{{ auth_result.sid }}"
        cname: "{{ item.cname }}"
        name: "{{ item.name }}"
        state: present
        unique: true
      loop: "{{ cname_records }}"
      loop_control:
        label: "{{ item.cname }}"
      check_mode: true
      register: _cname_check

    - name: Assert CNAME records report no changes
      ansible.builtin.assert:
        that: not item.changed
        fail_msg: >-
          CNAME record {{ item.item.cname }} -> {{ item.item.name }}
          reported changed=true – record may be missing.
        success_msg: "CNAME record {{ item.item.cname }} is idempotent."
      loop: "{{ _cname_check.results }}"
      loop_control:
        label: "{{ item.item.cname }}"

    # ------------------------------------------------------------------ #
    # Spot-check via Pi-hole API                                           #
    # ------------------------------------------------------------------ #
    - name: Retrieve all static DNS records from Pi-hole API
      ansible.builtin.uri:
        url: "{{ pihole_url }}/api/config/dns/hosts"
        method: GET
        headers:
          sid: "{{ auth_result.sid }}"
        status_code: 200
      register: _dns_api

    - name: Assert each A record is present in the API response
      ansible.builtin.assert:
        that: (item.ip ~ ' ' ~ item.name) in (_dns_api.json.config.dns.hosts | default([]))
        fail_msg: "A record '{{ item.ip }} {{ item.name }}' not found in Pi-hole."
        success_msg: "A record '{{ item.ip }} {{ item.name }}' is present."
      loop: "{{ a_records }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Assert each AAAA record is present in the API response
      ansible.builtin.assert:
        that: (item.ip ~ ' ' ~ item.name) in (_dns_api.json.config.dns.hosts | default([]))
        fail_msg: "AAAA record '{{ item.ip }} {{ item.name }}' not found in Pi-hole."
        success_msg: "AAAA record '{{ item.ip }} {{ item.name }}' is present."
      loop: "{{ aaaa_records }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Assert nas01.acme.lab has both A and AAAA records (coexistence)
      ansible.builtin.assert:
        that:
          - "'192.168.88.10 nas01.acme.lab' in (_dns_api.json.config.dns.hosts | default([]))"
          - "'fd00:dead:beef::10 nas01.acme.lab' in (_dns_api.json.config.dns.hosts | default([]))"
        fail_msg: >-
          nas01.acme.lab does not have both A and AAAA records.
          Current hosts: {{ _dns_api.json.config.dns.hosts | default([]) }}
        success_msg: "nas01.acme.lab has both A and AAAA records as expected."

    - name: Retrieve all CNAME records from Pi-hole API
      ansible.builtin.uri:
        url: "{{ pihole_url }}/api/config/dns/cnameRecords"
        method: GET
        headers:
          sid: "{{ auth_result.sid }}"
        status_code: 200
      register: _cname_api

    - name: Assert each CNAME record is present in the API response
      ansible.builtin.assert:
        that: >-
          (item.cname ~ ',' ~ item.name)
          in (_cname_api.json.config.dns.cnameRecords | default([]))
        fail_msg: "CNAME record '{{ item.cname }},{{ item.name }}' not found in Pi-hole."
        success_msg: "CNAME record '{{ item.cname }} -> {{ item.name }}' is present."
      loop: "{{ cname_records }}"
      loop_control:
        label: "{{ item.cname }}"

    - name: Retrieve all DHCP reservations from Pi-hole API
      ansible.builtin.uri:
        url: "{{ pihole_url }}/api/config/dhcp/hosts"
        method: GET
        headers:
          sid: "{{ auth_result.sid }}"
        status_code: 200
      register: _dhcp_api

    - name: Assert each DHCP reservation is present in the API response
      ansible.builtin.assert:
        that: >-
          _dhcp_api.json.config.dhcp.hosts | default([])
          | map('lower')
          | select('equalto', item.hw | lower ~ ',' ~ item.ip ~ ',' ~ item.name)
          | list | length == 1
        fail_msg: "DHCP reservation '{{ item.hw }},{{ item.ip }},{{ item.name }}' not found in Pi-hole."
        success_msg: "DHCP reservation '{{ item.name }}' ({{ item.hw }}) is present."
      loop: "{{ dhcp_reservations }}"
      loop_control:
        label: "{{ item.name }}"
