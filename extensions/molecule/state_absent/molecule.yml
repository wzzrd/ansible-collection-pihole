---
# Molecule scenario: state_absent
#
# Tests the state: absent (deletion) path for all resource types.
# prepare.yml creates a known set of resources via the modules.
# converge.yml removes them all with state: absent.
# verify.yml confirms every resource is gone and that re-running
# state: absent is idempotent (changed=false).
#
# Infrastructure is provided by the default scenario (shared_state: true).
#
# Usage:
#   molecule test --all --shared-state
#   PIHOLE_VERSION=2024.07.0 molecule test --all --shared-state

dependency:
  name: galaxy
  options:
    ignore-certs: true
    ignore-errors: true
    requirements-file: requirements.yml

driver:
  name: podman

provisioner:
  name: ansible
  log: true
  env:
    ANSIBLE_COLLECTIONS_PATHS: "${HOME}/.ansible/collections:/usr/share/ansible/collections"

verifier:
  name: ansible

scenario:
  name: state_absent
