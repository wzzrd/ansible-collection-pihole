---
# Molecule scenario: state_absent
#
# Tests the state: absent (deletion) path for all resource types.
# prepare.yml creates a known set of resources via the modules.
# converge.yml removes them all with state: absent.
# verify.yml confirms every resource is gone and that re-running
# state: absent is idempotent (changed=false).
#
# Usage:
#   molecule test -s state_absent
#   PIHOLE_VERSION=2024.07.0 molecule test -s state_absent

dependency:
  name: galaxy
  options:
    ignore-certs: true
    ignore-errors: true
    requirements-file: requirements.yml

driver:
  name: podman

platforms:
  - name: pihole-state-absent
    image: "docker.io/pihole/pihole:${PIHOLE_VERSION:-latest}"
    env:
      FTLCONF_webserver_api_password: "molecule_test_password"
      FTLCONF_dns_upstreams: "8.8.8.8;8.8.4.4"
      FTLCONF_dns_listeningMode: ALL
      TZ: "UTC"
    published_ports:
      - "127.0.0.1:8083:80/tcp"
    capabilities:
      - NET_ADMIN
      - CAP_SETUID
      - CAP_SETGID

provisioner:
  name: ansible
  log: true
  env:
    ANSIBLE_COLLECTIONS_PATHS: "${HOME}/.ansible/collections:/usr/share/ansible/collections"
  inventory:
    hosts:
      all:
        hosts:
          localhost:
            ansible_connection: local
            pihole_url: "http://localhost:8083"
            pihole_password: "molecule_test_password"
            molecule_debug: true

verifier:
  name: ansible

scenario:
  name: state_absent
  test_sequence:
    - dependency
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
