---
# Molecule scenario: batch_delete_groups
#
# Tests the batch_delete_groups module.
# prepare.yml creates three groups via the group module.
# converge.yml deletes all three in a single batch_delete_groups call.
# verify.yml confirms all groups are gone and that re-running the
# batch delete is idempotent (changed=false when groups don't exist).
#
# Usage:
#   molecule test -s batch_delete_groups
#   PIHOLE_VERSION=2024.07.0 molecule test -s batch_delete_groups

dependency:
  name: galaxy
  options:
    ignore-certs: true
    ignore-errors: true
    requirements-file: requirements.yml

driver:
  name: podman

platforms:
  - name: pihole-batch-delete
    image: "docker.io/pihole/pihole:${PIHOLE_VERSION:-latest}"
    env:
      FTLCONF_webserver_api_password: "molecule_test_password"
      FTLCONF_dns_upstreams: "8.8.8.8;8.8.4.4"
      FTLCONF_dns_listeningMode: ALL
      TZ: "UTC"
    published_ports:
      - "127.0.0.1:8084:80/tcp"
    capabilities:
      - NET_ADMIN

provisioner:
  name: ansible
  log: true
  env:
    ANSIBLE_COLLECTIONS_PATHS: "${HOME}/.ansible/collections:/usr/share/ansible/collections"
  inventory:
    hosts:
      all:
        hosts:
          localhost:
            ansible_connection: local
            pihole_url: "http://localhost:8084"
            pihole_password: "molecule_test_password"
            molecule_debug: true

verifier:
  name: ansible

scenario:
  name: batch_delete_groups
  test_sequence:
    - dependency
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
