name: Lint, test and tag

on:
  push:
    branches:
      - main

jobs:
  check-version:
    name: Check version change
    runs-on: ubi9-aarch64-ansible
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
      new_version: ${{ steps.check.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version changed
        id: check
        run: |
          NEW_VERSION=$(grep '^version:' galaxy.yml | awk '{print $2}')
          echo "Version in galaxy.yml: $NEW_VERSION"

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          LATEST_VERSION=${LATEST_TAG#v}
          echo "Latest tag version: $LATEST_VERSION"

          if [ "$NEW_VERSION" != "$LATEST_VERSION" ]; then
            echo "Version changed from $LATEST_VERSION to $NEW_VERSION"
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged ($NEW_VERSION)"
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

  lint:
    name: Ansible Lint
    runs-on: ubi9-aarch64-ansible
    container:
      image: quay.thuisnet.com/gitea/ansible-ci-runner:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install collection under test
        run: ansible-galaxy collection install . --upgrade

      - name: Run ansible-lint
        run: ansible-lint -v

  pytest:
    name: Unit Tests (pytest)
    runs-on: ubi9-aarch64-ansible
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install test dependencies
        run: pip-3.11 install -r tests/requirements.txt

      - name: Run pytest
        run: pytest tests/unit/ -v --tb=short --color=yes

  molecule:
    name: Integration Tests (Molecule) – ${{ matrix.scenario }}
    runs-on: ubi9-aarch64-ansible
    container:
      image: quay.thuisnet.com/gitea/ansible-ci-runner:latest
      env:
        DOCKER_HOST: unix:///run/podman/podman.sock
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - dns_dhcp
          - blocklists
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install collection under test
        run: ansible-galaxy collection install . --upgrade

      - name: Run Molecule tests
        run: molecule test -s ${{ matrix.scenario }}
        env:
          ANSIBLE_FORCE_COLOR: '1'
          PY_COLORS: '1'

  tag:
    name: Create git tag
    runs-on: ubi9-aarch64-ansible
    needs:
      - check-version
      - lint
      - pytest
      - molecule
    if: needs.check-version.outputs.version_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git config user.name "Gitea Actions"
          git config user.email "actions@git.wzzrd.com"
          git tag -a "v${{ needs.check-version.outputs.new_version }}" -m "Release v${{ needs.check-version.outputs.new_version }}"
          git push origin "v${{ needs.check-version.outputs.new_version }}"

  publish:
    name: Publish to Ansible Galaxy
    runs-on: ubi9-aarch64-ansible
    needs:
      - tag
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build collection
        run: ansible-galaxy collection build

      - name: Publish collection
        run: ansible-galaxy collection publish $(ls wzzrd-pihole-*.tar.gz) --token ${{ secrets.GALAXY_API_KEY }}

  mirror-tag:
    name: Mirror tag to GitHub
    runs-on: ubi9-aarch64-ansible
    needs:
      - tag
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push tag to GitHub
        run: |
          git remote add github https://x-access-token:${{ secrets.PIHOLE_GITHUB_MIRROR_TOKEN }}@github.com/wzzrd/ansible-collection-pihole.git
          git push github --tags
