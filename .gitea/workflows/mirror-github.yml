name: Mirror to GitHub

on:
  push:
    branches:
      - main

jobs:
  mirror:
    name: Push to GitHub mirror
    runs-on: ubi9-aarch64-ansible
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push branch and tags to GitHub
        run: |
          git remote add github https://x-access-token:${{ secrets.PIHOLE_GITHUB_MIRROR_TOKEN }}@github.com/wzzrd/ansible-collection-pihole.git
          git push github refs/heads/main:refs/heads/main
          git push github --tags
